<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GlucoCoach - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00BFB3",
                        "background-light": "#f5f8f8",
                        "background-dark": "#1E2130",
                        surface: "rgba(38, 43, 61, 0.65)",
                        "surface-solid": "#262B3D",
                        "text-main": "#F8F9FA",
                        "text-muted": "#9CA3AF",
                        danger: "#FF6B6B",
                    },
                    fontFamily: {
                        display: ["Poppins", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        sm: "0.5rem",
                        md: "1rem",
                        lg: "1.5rem",
                        xl: "2rem",
                        full: "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(38, 43, 61, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 191, 179, 0.4);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-text-main font-body min-h-screen flex flex-col antialiased selection:bg-primary/30">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pt-[120px] pb-10 max-w-md mx-auto">
<!-- Header / Logo -->
<div class="flex flex-col items-center justify-center px-6 mb-12">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="water_drop">water_drop</span>
</div>
<h1 class="text-primary tracking-tight text-[48px] font-display font-bold leading-tight text-center glow-text">
                GlucoCoach
            </h1>
<p class="text-text-muted mt-2 text-center text-[16px]">Your calm companion for T1D</p>
</div>
<!-- Form Area -->
<div class="flex flex-col px-6 gap-5 flex-1 w-full">
<!-- Email Input -->
<div class="flex flex-col w-full">
<label class="sr-only" for="email">Email Address</label>
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-4 text-text-muted text-[20px]" data-icon="mail">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-md text-text-main focus:outline-none focus:ring-1 focus:ring-primary border-none bg-surface-solid h-[56px] pl-12 pr-4 text-[16px] font-normal placeholder:text-text-muted transition-colors" id="email" placeholder="Email Address" type="email" value=""/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col w-full">
<label class="sr-only" for="password">Password</label>
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-4 text-text-muted text-[20px]" data-icon="lock">lock</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-md text-text-main focus:outline-none focus:ring-1 focus:ring-primary border-none bg-surface-solid h-[56px] pl-12 pr-12 text-[16px] font-normal placeholder:text-text-muted transition-colors" id="password" placeholder="Password" type="password" value=""/>
<button class="absolute right-4 text-text-muted hover:text-text-main transition-colors focus:outline-none flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Error State Example (Hidden by default, shown for structure context) -->
<!-- <p class="text-danger text-[14px] mt-2 ml-1 font-medium">Incorrect password</p> -->
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full mt-1">
<a class="text-primary text-[14px] font-medium hover:text-primary/80 transition-colors" href="#">
                    Forgot password?
                </a>
</div>
<!-- Sign In CTA -->
<div class="flex w-full mt-4">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-md h-[56px] px-5 bg-primary hover:bg-primary/90 active:bg-primary/80 text-background-dark text-[16px] font-display font-semibold transition-all shadow-[0_4px_14px_0_rgba(0,191,179,0.39)]">
<span>Sign In</span>
<!-- Loading State Example (Hidden by default) -->
<!-- <div class="flex space-x-1 items-center justify-center">
                        <div class="w-2 h-2 bg-background-dark rounded-full animate-bounce" style="animation-delay: -0.3s"></div>
                        <div class="w-2 h-2 bg-background-dark rounded-full animate-bounce" style="animation-delay: -0.15s"></div>
                        <div class="w-2 h-2 bg-background-dark rounded-full animate-bounce"></div>
                    </div> -->
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-auto px-6 flex flex-col items-center justify-center pt-8 gap-4">
<p class="text-text-muted text-[14px]">
                Don't have an account? 
                <a class="text-primary font-semibold ml-1 hover:underline transition-all" href="#">Create account</a>
</p>
</div>
</div>
</body></html>
